version: '3.8'

services:
  web:
    build: .
    container_name: odp-web
    ports:
      - "3000:3000"
      - "5000:5000"
    environment:
      - DATABASE_URL=file:/app/prisma/dev.db
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
      - NODE_ENV=production
    volumes:
      - ./prisma:/app/prisma
    restart: always


networks:
  default:
    name: odp-network
