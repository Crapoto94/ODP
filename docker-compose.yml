version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:./prisma/dev.db
      - APM_API_KEY=votre_cle_apm
      - APM_BASE_URL=http://localhost:8001/api/v1
    volumes:
      - .:/app
      - /app/node_modules

  db:
    image: keinos/sqlite3
    volumes:
      - ./prisma/dev.db:/db/dev.db
