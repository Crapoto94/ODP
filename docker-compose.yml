version: '3.8'

services:
  app:
    build: .
    container_name: odp-app
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:/app/prisma/dev.db
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
      - NODE_ENV=production
    volumes:
      - ./prisma:/app/prisma
    restart: always

networks:
  default:
    name: odp-network
